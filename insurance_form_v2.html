.field label{display:block;font-size:11px;font-weight:700;color:#5f6368;margin-bottom:4px}

.toggrp{display:flex;gap:10px;margin-bottom:14px}

.fambox{background:#faf5ff;border:1.5px solid #ce93d8;border-radius:10px;padding:16px;margin-top:4px}
.rc{border:1.5px solid #e8eaed;border-radius:10px;margin-bottom:12px;overflow:hidden}
.rch{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:#f8f9fa;border-bottom:1px solid #e8eaed}
.rch span{font-size:13px;font-weight:700;color:#3c4043}
.edbtn{font-size:12px;color:#1a73e8;cursor:pointer;padding:3px 10px;border:1px solid #1a73e8;border-radius:20px;background:#fff}
.rcb{padding:11px 14px}
.rrow{display:flex;gap:8px;margin-bottom:7px;font-size:13px}
.rrow:last-child{margin-bottom:0}
.rlbl{color:#5f6368;min-width:160px;flex-shrink:0}
.rval{color:#202124;font-weight:500}
.rval.emp{color:#9aa0a6;font-style:italic;font-weight:400}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}
.boi{background:#e6f4ea;color:#1e8e3e}
.boo{background:#fce8b2;color:#9a6700}
.bnew{background:#e8f0fe;color:#1557b0}
hr{border:none;border-top:1px solid #e8eaed;margin:16px 0}
.btnp{width:100%;padding:13px;background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .18s}
.btnp:hover{background:#1557b0}

.btns{width:100%;padding:11px;background:#fff;color:#1a73e8;border:2px solid #1a73e8;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}

.note{font-size:11px;color:#9aa0a6;text-align:center;margin-top:8px;line-height:1.5}
.spin{width:34px;height:34px;border:3px solid #e8eaed;border-top-color:#1a73e8;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}

@media(max-width:500px){.body{padding:16px 14px}.row2{grid-template-columns:1fr}.rlbl{min-width:120px}}

let APPS_URL="", emp=null, fd={}, coverage=null, famMode=null, isNewEmp=false;
const app=()=>document.getElementById("app");
const $=id=>document.getElementById(id);

// ── INIT ──────────────────────────────────────────────
window.onload=()=>{
  const p=new URLSearchParams(location.search);
  APPS_URL=p.get("api")||"";
  const tok=p.get("token");
  if(tok){ doLogin(atob(tok),true); } else { showLogin(); }
};

// ── SCREEN: LOGIN ─────────────────────────────────────
function showLogin(){
  app().innerHTML=`
  <div style="max-width:380px;margin:0 auto;padding:8px 0">
    <div class="alert ai">
      <strong>Existing employees:</strong> Enter your Employee ID — data will auto-fill.<br>
      <strong>New employees:</strong> Enter your new Employee ID — you will fill the form manually.
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>Employee ID *</label>
      <input id="li" type="text" placeholder="e.g. PD0012" style="text-transform:uppercase;font-size:15px;padding:11px 14px"
        onkeydown="if(event.key==='Enter')doLogin(this.value.trim().toUpperCase())">
    </div>
    <button class="btnp" onclick="doLogin($('li').value.trim().toUpperCase())">Continue</button>
    <p class="note">Trouble? Contact :pcsharma@paralleldots.com</p>
  </div>`;
  setTimeout(()=>{ const el=$("li"); if(el) el.focus(); },100);
}

function doLogin(id, silent){
  if(!id){ if(!silent) alert("Please enter your Employee ID"); return; }
  id = id.toUpperCase();

  // Search in DB
  const found = DB.find(e=>e.i===id);

  if(found){
    // ── EXISTING EMPLOYEE ──
    isNewEmp = false;
    emp = found;
    fd = {
      empId:id, name:emp.n, gender:emp.g, dob:emp.d, email:emp.e,
      coverage:"",
      spouseName:emp.sn,   spouseGender:emp.sg, spouseDob:emp.sd,
      child1Name:emp.c1n,  child1Gender:emp.c1g, child1Dob:emp.c1d,
      child2Name:emp.c2n,  child2Gender:emp.c2g, child2Dob:emp.c2d,
    };
    showReview();
  } else {
    // ── NEW EMPLOYEE — blank form ──
    isNewEmp = true;
    emp = null;
    fd = {
      empId:id, name:"", gender:"", dob:"", email:"",
      coverage:"",
      spouseName:"", spouseGender:"", spouseDob:"",
      child1Name:"", child1Gender:"", child1Dob:"",
      child2Name:"", child2Gender:"", child2Dob:"",
    };
    coverage=null; famMode=null;
    showFreshForm();
  }
}

// ── SCREEN: REVIEW (existing employees) ───────────────
function showReview(){
  const hasFam = fd.spouseName||fd.child1Name||fd.child2Name;
  const famCard = hasFam
    ? buildFamCard()
    : `<div class="rc">
        <div class="rch"><span>Family Members</span><button class="edbtn" onclick="editSection('family')">Edit / Add</button></div>
        <div class="rcb"><div class="rrow"><span class="rlbl">Members covered</span>
          <span class="rval emp">No family in records — click Edit to add</span></div></div>
       </div>`;

  let covBadge = fd.coverage
    ? (fd.coverage==="opt-in"
        ? '<span class="badge boi">Opted-in</span>'
        : '<span class="badge boo">Opted-out</span>')
    : '<span class="rval emp">Please select below ↓</span>';

  app().innerHTML=`
  ${steps(1)}
  <div class="alert ag">
    ✅ <strong>Your record found.</strong> Details pre-filled from our 2025-26 data.
    Review carefully — use <strong>Edit</strong> to correct anything.
  </div>

  <div class="rc">
    <div class="rch">
      <span>Employee Details <span class="tag-existing">Existing</span></span>
      <button class="edbtn" onclick="editSection('emp')">Edit</button>
    </div>
    <div class="rcb">
      ${rrow("Employee ID", fd.empId)}
      ${rrow("Name (as per Aadhaar)", fd.name)}
      ${rrow("Date of Birth", fmtD(fd.dob))}
      ${rrow("Gender", fd.gender)}
    </div>
  </div>

  ${famCard}

  <div class="rc">
    <div class="rch"><span>Coverage Selection</span></div>
    <div class="rcb">
      <div class="rrow"><span class="rlbl">Enrollment</span><span class="rval" id="cov-badge">${covBadge}</span></div>
      <div style="margin-top:10px">
        <div class="toggrp">
          <div class="togbtn oi ${fd.coverage==='opt-in'?'on':''}" onclick="setCov('opt-in')">
            ✅ Opt-in<small>Enroll in insurance</small>
          </div>
          <div class="togbtn oo ${fd.coverage==='opt-out'?'on':''}" onclick="setCov('opt-out')">
            ❌ Opt-out<small>Do not enroll</small>
          </div>
        </div>
        <div id="oo-note" style="display:${fd.coverage==='opt-out'?'block':'none'}">
          <div class="alert aw">You are choosing NOT to enroll. This will be saved as Opt-out.</div>
        </div>
      </div>
    </div>
  </div>

  <hr>
  <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:#3c4043;margin-bottom:14px">
    <input type="checkbox" id="chk" style="margin-top:2px;width:16px;height:16px;cursor:pointer"
      onchange="$('btn-sub').disabled=!this.checked">
    <span>I confirm all details above are correct. I understand that incorrect information may affect my insurance coverage.</span>
  </label>
  <button class="btnp" id="btn-sub" disabled onclick="doSubmit()">Confirm &amp; Submit</button>
  <p class="note">Deadline: <strong>INSERT DATE HERE</strong> &nbsp;·&nbsp; Queries: hr@paralleldots.com</p>`;
}

function buildFamCard(){
  let h=`<div class="rc"><div class="rch"><span>Family Members</span>
    <button class="edbtn" onclick="editSection('family')">Edit</button></div><div class="rcb">`;
  if(fd.spouseName) h+=rrow("Spouse Name",    fd.spouseName)+rrow("Spouse DOB", fmtD(fd.spouseDob));
  if(fd.child1Name) h+=rrow("Child 1 Name",   fd.child1Name)+rrow("Child 1 DOB",fmtD(fd.child1Dob));
  if(fd.child2Name) h+=rrow("Child 2 Name",   fd.child2Name)+rrow("Child 2 DOB",fmtD(fd.child2Dob));
  return h+'</div></div>';
}

function setCov(val){
  fd.coverage=val;
  document.querySelectorAll(".togbtn.oi,.togbtn.oo").forEach(b=>b.classList.remove("on"));
  document.querySelector(".togbtn."+(val==="opt-in"?"oi":"oo")).classList.add("on");
  $("oo-note").style.display = val==="opt-out"?"block":"none";
  $("cov-badge").innerHTML = val==="opt-in"
    ? '<span class="badge boi">Opted-in</span>'
    : '<span class="badge boo">Opted-out</span>';
}

    <div class="sec-title">Family Members</div>
    <div class="toggrp">
      <div class="togbtn fy" id="ff-y" onclick="setFam(true)">Add family<small>Spouse &amp; children</small></div>
      <div class="togbtn fn" id="ff-n" onclick="setFam(false)">Self only<small>No family to add</small></div>
    </div>
    ${famFieldsHtml()}
  </div>

  <hr>
  <button class="btnp" onclick="saveFresh()">Review &amp; Submit</button>
  <p class="note">All * fields are mandatory</p>`;
}

function setCovFresh(val){
  coverage=val;
  $("cov-oi").classList.toggle("on", val==="opt-in");
  $("cov-oo").classList.toggle("on", val==="opt-out");
  $("oo-note2").style.display   = val==="opt-out"?"block":"none";
  $("fam-sec").style.display    = val==="opt-in" ?"block":"none";
}

function saveFresh(){
  const n  = $("f-n")?.value.trim().toUpperCase();
  const g  = $("f-g")?.value;
  const d  = $("f-d")?.value;
  const e  = $("f-e")?.value.trim();
  if(!n){ alert("Name is required"); return; }
  if(!g||g==="— select —"){ alert("Gender is required"); return; }
  if(!d){ alert("Date of Birth is required"); return; }
  if(!e){ alert("Email is required"); return; }
  if(!coverage){ alert("Please select Opt-in or Opt-out"); return; }

  fd.name=n; fd.gender=g; fd.dob=d; fd.email=e; fd.coverage=coverage;

  if(coverage==="opt-in" && famMode){
    fd.spouseName   = ($("f-sn")?.value||"").trim().toUpperCase();
    fd.spouseGender = $("f-sg")?.value||"";
    fd.spouseDob    = $("f-sd")?.value||"";
    fd.child1Name   = ($("f-c1n")?.value||"").trim().toUpperCase();
    fd.child1Gender = $("f-c1g")?.value||"";
    fd.child1Dob    = $("f-c1d")?.value||"";
    fd.child2Name   = ($("f-c2n")?.value||"").trim().toUpperCase();
    fd.child2Gender = $("f-c2g")?.value||"";
    fd.child2Dob    = $("f-c2d")?.value||"";
  } else {
    fd.spouseName=fd.spouseGender=fd.spouseDob="";
    fd.child1Name=fd.child1Gender=fd.child1Dob="";
    fd.child2Name=fd.child2Gender=fd.child2Dob="";
  }
  showFreshReview();
}

function showFreshReview(){
  const hasFam = fd.spouseName||fd.child1Name||fd.child2Name;
  app().innerHTML=`
  ${steps(2)}
  <div class="alert ai">Please review your details before final submission.</div>

  <div class="rc">
    <div class="rch"><span>Your Details <span class="tag-new">New Employee</span></span>
      <button class="edbtn" onclick="showFreshForm()">Edit</button></div>
    <div class="rcb">
      ${rrow("Employee ID", fd.empId)}
      ${rrow("Name (Aadhaar)", fd.name)}
      ${rrow("Date of Birth", fmtD(fd.dob))}
      ${rrow("Gender", fd.gender)}
      ${rrow("Email", fd.email)}
    </div>
  </div>

  <div class="rc">
    <div class="rch"><span>Coverage</span></div>
    <div class="rcb">
      ${rrow("Enrollment", fd.coverage==="opt-in"
        ? '<span class="badge boi">Opted-in</span>'
        : '<span class="badge boo">Opted-out</span>')}
    </div>
  </div>

  ${hasFam ? buildFamCard() : ""}

  <hr>
  <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:#3c4043;margin-bottom:14px">
    <input type="checkbox" id="chk2" style="margin-top:2px;width:16px;height:16px;cursor:pointer"
      onchange="$('btn-sub2').disabled=!this.checked">
    <span>I confirm all details above are correct as per my Aadhaar card.</span>
  </label>
  <button class="btnp" id="btn-sub2" disabled onclick="doSubmit()">Confirm &amp; Submit</button>
  <button class="btns" onclick="showFreshForm()">Edit Details</button>`;
}

// ── SCREEN: EDIT (existing employee sections) ─────────
function editSection(sec){
  app().innerHTML=`
  ${steps(2)}
  <div class="alert aw">Edit carefully — use exact name/DOB from Aadhaar card.</div>
  ${sec==="emp"  ? empEditHtml()    : ""}
  ${sec==="family" ? famEditHtml()  : ""}
  <hr>
  <button class="btnp" onclick="saveEdit('${sec}')">Save &amp; Back to Review</button>
  <button class="btns" onclick="showReview()">Cancel</button>`;

  if(sec==="emp"){
    $("e-n").value = fd.name;
    $("e-g").value = fd.gender;
    $("e-d").value = fd.dob;
  }
  if(sec==="family"){
    setTimeout(()=>{
      if($("f-sn")) $("f-sn").value  = fd.spouseName   ||"";
      if($("f-sg")) $("f-sg").value  = fd.spouseGender ||"";
      if($("f-sd")) $("f-sd").value  = fd.spouseDob    ||"";
      if($("f-c1n"))$("f-c1n").value = fd.child1Name   ||"";
      if($("f-c1g"))$("f-c1g").value = fd.child1Gender ||"";
      if($("f-c1d"))$("f-c1d").value = fd.child1Dob    ||"";
      if($("f-c2n"))$("f-c2n").value = fd.child2Name   ||"";
      if($("f-c2g"))$("f-c2g").value = fd.child2Gender ||"";
      if($("f-c2d"))$("f-c2d").value = fd.child2Dob    ||"";
      if(fd.spouseName||fd.child1Name||fd.child2Name) setFam(true);
    },50);
  }
}

function empEditHtml(){
  return `<div class="sec-title">Employee Details</div>
  <div class="row2">
    <div class="field"><label>Employee ID</label><input value="${fd.empId}" readonly></div>
    <div class="field"><label>Gender</label>
      <select id="e-g"><option>MALE</option><option>FEMALE</option><option>OTHER</option></select></div>
  </div>
  <div class="row1"><div class="field"><label>Name as per Aadhaar *</label>
    <input type="text" id="e-n" placeholder="Exact name on Aadhaar"></div></div>
  <div class="row2"><div class="field"><label>Date of Birth (Aadhaar) *</label>
    <input type="date" id="e-d"></div></div>`;
}

function famEditHtml(){
  return `<div class="sec-title">Family Members</div>
  <div class="toggrp">
    <div class="togbtn fy" id="ff-y" onclick="setFam(true)">Add / Edit family<small>Spouse &amp; children</small></div>
    <div class="togbtn fn" id="ff-n" onclick="setFam(false)">Self only<small>Remove all family</small></div>
  </div>
  ${famFieldsHtml()}`;
}

function famFieldsHtml(){
  return `<div id="fam-fields" style="display:none"><div class="fambox">
  <div class="sec-title" style="margin-top:0;border-color:#ce93d8">Spouse</div>
  <div class="row1"><div class="field"><label>Spouse Name (Aadhaar)</label>
    <input type="text" id="f-sn" placeholder="Leave blank if not applicable"></div></div>
  <div class="row2">
    <div class="field"><label>Spouse Gender</label>
      <select id="f-sg"><option value="">—</option><option>MALE</option><option>FEMALE</option></select></div>
    <div class="field"><label>Spouse DOB</label><input type="date" id="f-sd"></div>
  </div>
  <div class="sec-title" style="border-color:#ce93d8">Child 1</div>
  <div class="row1"><div class="field"><label>Child 1 Name (Aadhaar / Birth Certificate)</label>
    <input type="text" id="f-c1n" placeholder="Leave blank if not applicable"></div></div>
  <div class="row2">
    <div class="field"><label>Child 1 Gender</label>
      <select id="f-c1g"><option value="">—</option><option>MALE</option><option>FEMALE</option></select></div>
    <div class="field"><label>Child 1 DOB</label><input type="date" id="f-c1d"></div>
  </div>
  <div class="sec-title" style="border-color:#ce93d8">Child 2</div>
  <div class="row1"><div class="field"><label>Child 2 Name (Aadhaar / Birth Certificate)</label>
    <input type="text" id="f-c2n" placeholder="Leave blank if not applicable"></div></div>
  <div class="row2">
    <div class="field"><label>Child 2 Gender</label>
      <select id="f-c2g"><option value="">—</option><option>MALE</option><option>FEMALE</option></select></div>
    <div class="field"><label>Child 2 DOB</label><input type="date" id="f-c2d"></div>
  </div>
  </div></div>`;
}

function setFam(show){
  famMode=show;
  const yb=$("ff-y"), nb=$("ff-n"), ff=$("fam-fields")||$("fam-fields");
  if(yb){ yb.classList.toggle("on",show); nb.classList.toggle("on",!show); }
  // find the fam-fields div (could be in edit or fresh form)
  const fd_el = document.getElementById("fam-fields");
  if(fd_el) fd_el.style.display = show?"block":"none";
}

function saveEdit(sec){
  if(sec==="emp"){
    if(!$("e-n").value.trim()){ alert("Name is required"); return; }
    if(!$("e-d").value){ alert("DOB is required"); return; }
    fd.name  =$("e-n").value.trim().toUpperCase();
    fd.gender=$("e-g").value;
    fd.dob   =$("e-d").value;
  }
  if(sec==="family"){
    if(famMode){
      fd.spouseName   =($("f-sn")?.value||"").trim().toUpperCase();
      fd.spouseGender =$("f-sg")?.value||"";
      fd.spouseDob    =$("f-sd")?.value||"";
      fd.child1Name   =($("f-c1n")?.value||"").trim().toUpperCase();
      fd.child1Gender =$("f-c1g")?.value||"";
      fd.child1Dob    =$("f-c1d")?.value||"";
      fd.child2Name   =($("f-c2n")?.value||"").trim().toUpperCase();
      fd.child2Gender =$("f-c2g")?.value||"";
      fd.child2Dob    =$("f-c2d")?.value||"";
    } else {
      fd.spouseName=fd.spouseGender=fd.spouseDob="";
      fd.child1Name=fd.child1Gender=fd.child1Dob="";
      fd.child2Name=fd.child2Gender=fd.child2Dob="";
    }
  }
  showReview();
}

// ── SUBMIT ────────────────────────────────────────────
function doSubmit(){
  if(!fd.coverage){ alert("Please select Opt-in or Opt-out"); return; }
  const btnId = isNewEmp?"btn-sub2":"btn-sub";
  const btn = $(btnId);
  btn.disabled=true; btn.textContent="Submitting…";

  const payload = {
    empId:fd.empId, name:fd.name, gender:fd.gender, dob:fd.dob,
    email:fd.email, coverage:fd.coverage, isNew:isNewEmp,
    spouseName:fd.spouseName,   spouseGender:fd.spouseGender, spouseDob:fd.spouseDob,
    child1Name:fd.child1Name,   child1Gender:fd.child1Gender, child1Dob:fd.child1Dob,
    child2Name:fd.child2Name,   child2Gender:fd.child2Gender, child2Dob:fd.child2Dob,
  };

  if(APPS_URL){
    fetch(APPS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)})
      .then(r=>r.json())
      .then(d=>{ if(d.success) showSuccess(); else { alert("Error: "+d.error); btn.disabled=false; btn.textContent="Confirm & Submit"; }})
      .catch(()=>{ alert("Network error. Try again."); btn.disabled=false; btn.textContent="Confirm & Submit"; });
  } else {
    showSuccess(); // offline/test mode
  }
}

// ── SCREEN: SUCCESS ───────────────────────────────────
function showSuccess(){
  const isIn=fd.coverage==="opt-in";
  app().innerHTML=`
  ${steps(3)}
  <div style="text-align:center;padding:24px 10px">
    <div style="font-size:52px;margin-bottom:10px">✅</div>
    <p style="font-size:18px;font-weight:700;color:#1e8e3e;margin-bottom:6px">Submitted Successfully!</p>
    <p style="font-size:13px;color:#5f6368;line-height:1.6">
      ${isIn?"Your enrollment has been recorded. HR will contact you if additional documents are needed."
             :"Your opt-out has been recorded. You will not be covered under the group policy."}
    </p>
  </div>
  <div class="alert as">
    <strong>Summary:</strong><br>
    ${fd.name} &nbsp;|&nbsp; ID: ${fd.empId}
    ${isNewEmp?' <span class="badge bnew">New Employee</span>':''}<br>
    Coverage: <strong>${isIn?"Opted-in ✅":"Opted-out ❌"}</strong>
    ${isIn&&(fd.spouseName||fd.child1Name)?"<br>Family members: included":""}
  </div>
  <p class="note">For corrections, contact hr@paralleldots.com</p>`;
}

// ── HELPERS ───────────────────────────────────────────
function steps(a){
  const s=(n,l)=>`<div class="step ${n<a?'done':n===a?'active':''}">
    <div class="sdot">${n<a?'✓':n}</div><span>${l}</span></div>`;
  const l=(n)=>`<div class="sline ${n<a?'done':''}"></div>`;
  return `<div class="steps">${s(1,"Review")}${l(1)}${s(2,"Edit")}${l(2)}${s(3,"Done")}</div>`;
}
function rrow(lbl,val){
  const e=!val||val==="—";
  return `<div class="rrow"><span class="rlbl">${lbl}</span>
    <span class="rval${e?' emp':''}">${e?"Not provided":val}</span></div>`;
}
function fmtD(d){
  if(!d) return "";
  try{ return new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}); }
  catch(e){ return d; }
}
</script>
</body>
</html>
